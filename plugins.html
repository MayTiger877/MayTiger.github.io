<!DOCTYPE html>
<html lang="en">
<head>

<title>Plugins | May Tiger</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<audio id="bootSound" src="sounds/Load.wav" preload="auto"></audio>
<audio id="bgMusic"   src="sounds/BG.wav"   loop preload="auto"></audio>

<section id="plugins" class="plugins active">
    <div class="back-btn" onclick="goTo('menu.html')">&#8592; Back</div>

        <h2>Plugins</h2>
        <a class="menu-list-item" onclick="goTo('plugin-ballpit.html')">

            <div class="menu-list-text">
                <h3>BallPit</h3>
                <p>Physics based MIDI Generator &nbsp;&#183;&nbsp; VST3</p>
            </div>
            <span class="arrow">&#8250;</span>
        </a>
        <a class="menu-list-item" onclick="goTo('plugin-exodus.html')">
            <img src="images/Exodus.png" class="item-img">
            <div class="menu-list-text">
                <h3>Exodus</h3>
                <p>Delay with individual effects per delay line &nbsp;&#183;&nbsp; VST3</p>
            </div>
            <span class="arrow">&#8250;</span>
        </a>
    </div>
</section>

<script src="scripts.js"></script>
