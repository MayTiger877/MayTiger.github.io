<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #000);
    color: #cfd8ff;
}

nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: rgba(0,0,50,0.5);
    backdrop-filter: blur(10px);
}

nav a {
    color: #8aa0ff;
    text-decoration: none;
}

header {
    text-align: center;
    padding: 80px 20px;
}

section {
    padding: 60px 20px;
    max-width: 1300px;
    margin: auto;
}

.selector {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.arrow {
    font-size: 30px;
    cursor: pointer;
    padding: 20px;
    color: #6f8cff;
    user-select: none;
}

.arrow:hover {
    color: #fff;
    text-shadow: 0 0 10px #4f6cff;
}

.card {
    width: 600px;
    background: rgba(20, 30, 80, 0.3);
    border: 1px solid rgba(100,100,255,0.3);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(8px);
    text-align: center;
}

h2 { color: #8aa0ff; }

.skills span {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    border: 1px solid #4f6cff;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#plugins">Plugins</a>
</nav>

<header id="home">
    <h1>May Tiger</h1>
    <p>C++ Audio Software Engineer</p>
</header>

<section id="projects">
    <h2>Project</h2>
    <div class="selector">
        <div class="arrow" onclick="prev('project')">◀</div>
        <div class="card" id="projectDisplay"></div>
        <div class="arrow" onclick="next('project')">▶</div>
    </div>
</section>

<section id="plugins">
    <h2>Plugin</h2>
    <div class="selector">
        <div class="arrow" onclick="prev('plugin')">◀</div>
        <div class="card" id="pluginDisplay"></div>
        <div class="arrow" onclick="next('plugin')">▶</div>
    </div>
</section>

<section>
    <h2>Skills</h2>
    <div class="skills">
        <span>C++</span>
        <span>JUCE</span>
        <span>DSP</span>
        <span>Embedded Linux</span>
    </div>
</section>

<footer>© 2026</footer>

<script>
const projects = [
  {
    title: "PhaseForge Engine",
    desc: "Real-time C++ audio engine with ultra-low latency.",
    tech: "C++, JUCE, DSP"
  }
];

const plugins = [
  {
    title: "NX Reverb",
    desc: "Algorithmic reverb with diffusion network.",
    tech: "VST3, DSP"
  }
];

let index = { project: 0, plugin: 0 };

function render(type) {
  const data = type === 'project' ? projects : plugins;
  const el = document.getElementById(type + 'Display');
  const item = data[index[type]];

  el.innerHTML = `
    <h3>${item.title}</h3>
    <p>${item.desc}</p>
    <p><b>${item.tech}</b></p>
  `;
}

function next(type) {
  const data = type === 'project' ? projects : plugins;
  index[type] = (index[type] + 1) % data.length;
  render(type);
}

function prev(type) {
  const data = type === 'project' ? projects : plugins;
  index[type] = (index[type] - 1 + data.length) % data.length;
  render(type);
}

render('project');
render('plugin');
</script>

</body>
</html>
